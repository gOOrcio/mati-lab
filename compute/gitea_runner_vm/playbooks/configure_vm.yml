---
- name: Configure gitea-runner VM
  hosts: gitea_runner
  become: true
  vars_files:
    - ../group_vars/all/vars.yml

  tasks:
    - name: Allow passwordless sudo for Ansible user
      ansible.builtin.copy:
        content: "{{ vm_ssh_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ vm_ssh_user }}"
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - qemu-user-static
          - binfmt-support
        state: present
        update_cache: true

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repo
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ vm_ssh_user }}"
        groups: docker
        append: true

    - name: Register qemu arm64 binfmt at boot
      ansible.builtin.copy:
        dest: /etc/systemd/system/qemu-binfmt.service
        mode: "0644"
        content: |
          [Unit]
          Description=Register qemu-user-static binfmts for cross-arch container builds
          After=docker.service network-online.target
          Requires=docker.service

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/docker run --privileged --rm tonistiigi/binfmt --install arm64
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target

    - name: Enable qemu-binfmt and docker
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - docker
        - qemu-binfmt
