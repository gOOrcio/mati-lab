---
- name: Deploy gitea-runner (act_runner) on gitea-runner VM
  hosts: gitea_runner
  become: true
  vars_files:
    - ../group_vars/all/vars.yml

  tasks:
    # Container runs DinD as root (rootful). /data and /secrets are bind-mounted
    # without user-namespace remapping, so root inside == root on host. The
    # rootless variant was abandoned because nested rootless dockerd silently
    # disables cgroups in a non-systemd container, producing the cleanup race
    # documented in KNOWN_FLAKE_act_runner_cleanup_race.md.
    - name: Create runner state root
      ansible.builtin.file:
        path: /var/lib/gitea-runner
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create runner state dirs
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      loop:
        - /var/lib/gitea-runner/data
        - /var/lib/gitea-runner/secrets

    # When migrating from the rootless variant, /var/lib/gitea-runner/data is
    # owned by uid 1000 (the in-container `rootless` user). Reclaim it so the
    # rootful daemon writes its state cleanly. Idempotent on subsequent runs.
    - name: Reclaim runner state from previous rootless deploys
      ansible.builtin.file:
        path: /var/lib/gitea-runner/data
        state: directory
        owner: root
        group: root
        recurse: true

    - name: Render compose.yml
      ansible.builtin.template:
        src: ../templates/compose.yml.j2
        dest: /var/lib/gitea-runner/compose.yml
        mode: "0644"
      notify: restart gitea-runner

    - name: Render runner config.yaml
      ansible.builtin.template:
        src: ../templates/runner-config.yaml.j2
        dest: /var/lib/gitea-runner/config.yaml
        mode: "0644"
      notify: restart gitea-runner

    # Bind-mounted at /etc/docker/daemon.json inside the runner container.
    # Rootful dockerd reads it on startup; root in the container reads any
    # ownership on the host since the mount is read-only.
    - name: Render dockerd daemon.json (registry-mirror config)
      ansible.builtin.template:
        src: ../templates/daemon.json.j2
        dest: /var/lib/gitea-runner/daemon.json
        owner: root
        group: root
        mode: "0644"
      notify: restart gitea-runner

    - name: Render systemd unit
      ansible.builtin.template:
        src: ../templates/gitea-runner.service.j2
        dest: /etc/systemd/system/gitea-runner.service
        mode: "0644"
      notify: reload systemd

    - name: Pull gitea-runner image
      ansible.builtin.command:
        cmd: "docker pull gitea/runner:{{ gitea_runner_version }}-dind"
      changed_when: true

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: restart gitea-runner
      ansible.builtin.systemd:
        name: gitea-runner.service
        state: restarted
