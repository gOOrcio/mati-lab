---
- name: Deploy act_runner on gitea-runner VM
  hosts: gitea_runner
  become: true
  vars_files:
    - ../group_vars/all/vars.yml

  tasks:
    # Container runs DinD-rootless as uid 1000. /data and /secrets are bind-mounted
    # without user-namespace remapping, so dirs must be owned by 1000:1000 on the
    # host or the runner can't read its registration token or persist its identity.
    - name: Create runner state root
      ansible.builtin.file:
        path: /var/lib/gitea-runner
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create runner state dirs (uid 1000 for rootless container)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0700"
      loop:
        - /var/lib/gitea-runner/data
        - /var/lib/gitea-runner/secrets

    - name: Render compose.yml
      ansible.builtin.template:
        src: ../templates/compose.yml.j2
        dest: /var/lib/gitea-runner/compose.yml
        mode: "0644"

    - name: Render runner config.yaml
      ansible.builtin.template:
        src: ../templates/runner-config.yaml.j2
        dest: /var/lib/gitea-runner/config.yaml
        mode: "0644"

    - name: Render systemd unit
      ansible.builtin.template:
        src: ../templates/gitea-runner.service.j2
        dest: /etc/systemd/system/gitea-runner.service
        mode: "0644"
      notify: reload systemd

    - name: Pull act_runner image
      ansible.builtin.command:
        cmd: "docker pull gitea/act_runner:{{ act_runner_version }}-dind-rootless"
      changed_when: true

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
