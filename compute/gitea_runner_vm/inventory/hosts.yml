all:
  children:
    proxmox:
      hosts:
        proxmox-host:
          ansible_host: "{{ proxmox_host }}"
          ansible_user: root
    gitea_runner:
      hosts:
        gitea-runner:
          ansible_host: "{{ vm_ip }}"
          ansible_user: "{{ vm_ssh_user }}"
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
