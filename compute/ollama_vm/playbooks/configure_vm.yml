- name: Configure VM
  hosts: ollama-gpu
  become: true
  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml
  tasks:
    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - fail2ban
          - linux-headers-generic
        state: present

    - name: Install Nvidia open driver
      ansible.builtin.apt:
        name: "{{ nvidia_driver_package }}"
        state: present
      # Driver installation triggers a kernel module build — reboot required after this task
      # if running for the first time. The play continues; reboot manually if nvidia-smi fails.

    - name: Configure UFW — allow SSH from LAN
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
        src: "192.168.1.0/24"

    - name: Configure UFW — allow Ollama from LAN
      community.general.ufw:
        rule: allow
        port: "11434"
        proto: tcp
        src: "192.168.1.0/24"

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Enable fail2ban
      ansible.builtin.service:
        name: fail2ban
        enabled: true
        state: started
