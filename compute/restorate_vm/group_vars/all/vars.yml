# Proxmox connection
proxmox_host: "192.168.1.184"
proxmox_node: "proxmox"
proxmox_api_user: "root@pam"
proxmox_api_token_id:     "{{ vault_proxmox_api_token_id }}"
proxmox_api_token_secret: "{{ vault_proxmox_api_token_secret }}"

# VM spec
vm_id: 105
vm_name: "restorate"
vm_template_id: 9000
vm_cores: 2
vm_memory_mb: 2048
vm_disk_size: "20G"
vm_storage: "local-lvm"

# Network (static)
vm_ip: "192.168.1.203"
vm_gateway: "192.168.1.1"
vm_nameserver: "192.168.1.1"
vm_cidr: 24

# SSH
vm_ssh_user: "debian"
vm_ssh_key_path: "~/.ssh/id_ed25519.pub"

# Docker
docker_registry_mirror: "http://192.168.1.252:5000"
docker_log_max_size: "10m"
docker_log_max_file: "3"

# App
app_repo_path: "/home/gooral/Projects/resto-rate"
app_remote_path: "/opt/restorate"
registry_image_api: "registry.mati-lab.online/restorate-api:latest"
registry_image_web: "registry.mati-lab.online/restorate-web:latest"

# API / frontend URLs
api_host: "restorate.mati-lab.online"
vite_api_url: "https://restorate.mati-lab.online"

# PostgreSQL
postgres_db: "restorate"
postgres_user: "restorate"

# Valkey
valkey_password: "{{ vault_valkey_password }}"
