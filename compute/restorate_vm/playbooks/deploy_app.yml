- name: Deploy Restorate
  hosts: restorate
  gather_facts: false
  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml

  pre_tasks:
    - name: Build and push API image
      ansible.builtin.command:
        cmd: >-
          docker buildx build --push
          -t {{ registry_image_api }}
          -f Dockerfile.api
          .
        chdir: "{{ app_repo_path }}"
      delegate_to: localhost
      run_once: true
      changed_when: true

    - name: Build and push web image
      ansible.builtin.command:
        cmd: >-
          docker buildx build --push
          -t {{ registry_image_web }}
          --build-arg VITE_API_URL={{ vite_api_url }}
          -f Dockerfile.web
          .
        chdir: "{{ app_repo_path }}"
      delegate_to: localhost
      run_once: true
      changed_when: true

  tasks:
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_remote_path }}"
        state: directory
        owner: "{{ vm_ssh_user }}"
        mode: "0755"
      become: true

    - name: Write valkey.conf
      ansible.builtin.template:
        src: ../templates/valkey.conf.j2
        dest: "{{ app_remote_path }}/valkey.conf"
        owner: "{{ vm_ssh_user }}"
        mode: "0644"

    - name: Write docker-compose.yml
      ansible.builtin.template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ app_remote_path }}/docker-compose.yml"
        owner: "{{ vm_ssh_user }}"
        mode: "0644"

    - name: Write Caddyfile
      ansible.builtin.template:
        src: ../templates/Caddyfile.j2
        dest: "{{ app_remote_path }}/Caddyfile"
        owner: "{{ vm_ssh_user }}"
        mode: "0644"

    - name: Write Promtail config
      ansible.builtin.template:
        src: ../templates/promtail-config.yml.j2
        dest: "{{ app_remote_path }}/promtail-config.yml"
        owner: "{{ vm_ssh_user }}"
        mode: "0644"

    - name: Write API .env
      ansible.builtin.template:
        src: ../templates/api.env.j2
        dest: "{{ app_remote_path }}/api.env"
        owner: "{{ vm_ssh_user }}"
        mode: "0600"

    - name: Write postgres.env
      ansible.builtin.template:
        src: ../templates/postgres.env.j2
        dest: "{{ app_remote_path }}/postgres.env"
        owner: "{{ vm_ssh_user }}"
        mode: "0600"

    - name: Write web .env
      ansible.builtin.template:
        src: ../templates/web.env.j2
        dest: "{{ app_remote_path }}/web.env"
        owner: "{{ vm_ssh_user }}"
        mode: "0600"

    - name: Pull latest images and start stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_remote_path }}"
        pull: always
        state: present
        remove_orphans: true
