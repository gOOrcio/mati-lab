- name: Configure Smart Resume LXC
  hosts: smart-resume
  become: true
  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml
  tasks:
    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - fail2ban
          - rsync
          - python3
          - python3-venv
          - python3-dev
          - libgomp1
        state: present

    # ── uv (Python package manager) ──────────────────────────────────────────
    - name: Install uv
      ansible.builtin.shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: /root/.local/bin/uv

    - name: Symlink uv to /usr/local/bin
      ansible.builtin.file:
        src: /root/.local/bin/uv
        dest: /usr/local/bin/uv
        state: link

    # ── Caddy ────────────────────────────────────────────────────────────────
    - name: Ensure APT keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Caddy GPG key
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        dest: /etc/apt/keyrings/caddy-stable.asc
        mode: "0644"

    - name: Add Caddy APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/etc/apt/keyrings/caddy-stable.asc]
          https://dl.cloudsmith.io/public/caddy/stable/deb/debian
          any-version main

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        update_cache: true

    # ── Firewall ─────────────────────────────────────────────────────────────
    - name: Configure UFW — allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Configure UFW — allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Enable fail2ban
      ansible.builtin.service:
        name: fail2ban
        enabled: true
        state: started
