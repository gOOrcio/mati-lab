- name: Configure Restorate LXC
  hosts: restorate
  become: true
  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml
  tasks:
    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - fail2ban
          - rsync
          - unzip
        state: present

    - name: Ensure APT keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    # ── PostgreSQL 17 (PGDG repo) ───────────────────────────────────────────
    - name: Add PostgreSQL GPG key
      ansible.builtin.get_url:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        dest: /etc/apt/keyrings/postgresql.asc
        mode: "0644"

    - name: Add PostgreSQL APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/etc/apt/keyrings/postgresql.asc]
          https://apt.postgresql.org/pub/repos/apt
          bookworm-pgdg main

    - name: Install PostgreSQL 17
      ansible.builtin.apt:
        name: postgresql-17
        update_cache: true

    - name: Create PostgreSQL user
      ansible.builtin.command:
        cmd: >-
          sudo -u postgres psql -tAc
          "DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='{{ postgres_user }}') THEN
              CREATE ROLE {{ postgres_user }} WITH LOGIN PASSWORD '{{ vault_postgres_password }}';
            END IF;
          END $$;"
      changed_when: false

    - name: Check if database exists
      ansible.builtin.command:
        cmd: >-
          sudo -u postgres psql -tAc
          "SELECT 1 FROM pg_database WHERE datname='{{ postgres_db }}'"
      register: db_exists
      changed_when: false

    - name: Create database if not exists
      ansible.builtin.command:
        cmd: >-
          sudo -u postgres createdb -O {{ postgres_user }} {{ postgres_db }}
      when: db_exists.stdout != "1"

    # ── Valkey ───────────────────────────────────────────────────────────────
    - name: Add Valkey GPG key
      ansible.builtin.get_url:
        url: https://packages.valkey.io/gpg
        dest: /etc/apt/keyrings/valkey.asc
        mode: "0644"

    - name: Add Valkey APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/etc/apt/keyrings/valkey.asc]
          https://packages.valkey.io/deb
          bookworm main

    - name: Install Valkey
      ansible.builtin.apt:
        name: valkey
        update_cache: true

    # ── Node.js 22 LTS (NodeSource) ─────────────────────────────────────────
    - name: Add NodeSource GPG key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: "0644"

    - name: Add NodeSource APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/etc/apt/keyrings/nodesource.asc]
          https://deb.nodesource.com/node_22.x
          nodistro main

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        update_cache: true

    # ── Caddy ────────────────────────────────────────────────────────────────
    - name: Add Caddy GPG key
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        dest: /etc/apt/keyrings/caddy-stable.asc
        mode: "0644"

    - name: Add Caddy APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/etc/apt/keyrings/caddy-stable.asc]
          https://dl.cloudsmith.io/public/caddy/stable/deb/debian
          any-version main

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        update_cache: true

    # ── Application user ─────────────────────────────────────────────────────
    - name: Create restorate system user
      ansible.builtin.user:
        name: restorate
        system: true
        shell: /bin/false
        home: /opt/restorate
        create_home: false

    # ── Firewall ─────────────────────────────────────────────────────────────
    - name: Configure UFW — allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Configure UFW — allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Configure UFW — allow Prometheus scrape from LAN
      community.general.ufw:
        rule: allow
        port: "{{ api_port | string }}"
        proto: tcp
        src: "192.168.1.0/24"

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Enable fail2ban
      ansible.builtin.service:
        name: fail2ban
        enabled: true
        state: started
