- name: Configure Restorate LXC
  hosts: restorate
  become: true
  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml
  tasks:
    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - fail2ban
          - sudo
          - rsync
          - unzip
          - locales
        state: present

    # ── Locale (required for PostgreSQL UTF8 encoding) ───────────────────
    - name: Enable en_US.UTF-8 locale
      ansible.builtin.lineinfile:
        path: /etc/locale.gen
        regexp: '^# en_US.UTF-8'
        line: 'en_US.UTF-8 UTF-8'

    - name: Generate locales
      ansible.builtin.command: locale-gen
      changed_when: true

    - name: Ensure APT keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    # ── PostgreSQL 17 (PGDG repo) ───────────────────────────────────────────
    - name: Add PostgreSQL GPG key
      ansible.builtin.get_url:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        dest: /etc/apt/keyrings/postgresql.asc
        mode: "0644"

    - name: Add PostgreSQL APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/etc/apt/keyrings/postgresql.asc]
          https://apt.postgresql.org/pub/repos/apt
          bookworm-pgdg main

    - name: Install PostgreSQL 17
      ansible.builtin.apt:
        name:
          - postgresql-17
          - python3-psycopg2
        update_cache: true

    - name: Ensure PostgreSQL user exists
      become: true
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ postgres_user }}"
        password: "{{ vault_postgres_password }}"
        role_attr_flags: LOGIN
        state: present
      no_log: true

    - name: Ensure PostgreSQL database exists
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ postgres_db }}"
        owner: "{{ postgres_user }}"
        encoding: UTF-8
        lc_collate: en_US.UTF-8
        lc_ctype: en_US.UTF-8
        template: template0
        state: present

    # ── Valkey (prebuilt binary — APT repo SSL is broken) ──────────────────
    - name: Check if Valkey is installed
      ansible.builtin.command: /usr/local/bin/valkey-server --version
      register: valkey_installed
      failed_when: false
      changed_when: false

    - name: Download Valkey binary tarball
      ansible.builtin.get_url:
        url: "{{ valkey_tarball_url }}"
        dest: "/tmp/valkey-{{ valkey_version }}.tar.gz"
      when: valkey_installed.rc != 0

    - name: Extract and install Valkey binaries
      ansible.builtin.shell: |
        cd /tmp
        tar xzf valkey-{{ valkey_version }}.tar.gz
        cp valkey-{{ valkey_version }}-jammy-x86_64/bin/valkey-* /usr/local/bin/
        chmod 755 /usr/local/bin/valkey-*
      args:
        creates: /usr/local/bin/valkey-server
      when: valkey_installed.rc != 0

    - name: Create valkey system user
      ansible.builtin.user:
        name: valkey
        system: true
        shell: /bin/false
        home: /var/lib/valkey
        create_home: true

    - name: Create Valkey directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: valkey
        group: valkey
        mode: "0750"
      loop:
        - /var/lib/valkey
        - /etc/valkey

    - name: Write Valkey systemd unit
      ansible.builtin.template:
        src: ../templates/valkey.service.j2
        dest: /etc/systemd/system/valkey.service
        mode: "0644"

    # ── Node.js 22 LTS (NodeSource) ─────────────────────────────────────────
    - name: Add NodeSource GPG key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: "0644"

    - name: Add NodeSource APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/etc/apt/keyrings/nodesource.asc]
          https://deb.nodesource.com/node_22.x
          nodistro main

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        update_cache: true

    # ── Caddy ────────────────────────────────────────────────────────────────
    - name: Add Caddy GPG key
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        dest: /etc/apt/keyrings/caddy-stable.asc
        mode: "0644"

    - name: Add Caddy APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/etc/apt/keyrings/caddy-stable.asc]
          https://dl.cloudsmith.io/public/caddy/stable/deb/debian
          any-version main

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        update_cache: true

    # ── Application user ─────────────────────────────────────────────────────
    - name: Create restorate system user
      ansible.builtin.user:
        name: restorate
        system: true
        shell: /bin/false
        home: /opt/restorate
        create_home: false

    # ── Firewall ─────────────────────────────────────────────────────────────
    - name: Configure UFW — allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Configure UFW — allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Configure UFW — allow Prometheus scrape from LAN
      community.general.ufw:
        rule: allow
        port: "{{ api_port | string }}"
        proto: tcp
        src: "192.168.1.0/24"

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Enable fail2ban
      ansible.builtin.service:
        name: fail2ban
        enabled: true
        state: started
