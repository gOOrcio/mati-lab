# Proxmox API connection
proxmox_host: "192.168.1.184"
proxmox_node: "proxmox"
proxmox_api_user: "root@pam"
proxmox_api_token_id:     "{{ vault_proxmox_api_token_id }}"
proxmox_api_token_secret: "{{ vault_proxmox_api_token_secret }}"

# ZFS ARC limits
