ollama_balloon_min_mb: 4096
ollama_memory_max_mb: 12288

# SonarQube VM
sonarqube_vm_id: 103

# GPU passthrough
gpu_pcie_address: "0000:26:00"
ollama_host_port: "0.0.0.0:11434"
