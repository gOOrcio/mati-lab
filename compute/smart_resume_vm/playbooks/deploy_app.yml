- name: Deploy application
  hosts: smart-resume
  gather_facts: false
  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml

  pre_tasks:
    - name: Lint API code (ruff)
      ansible.builtin.command:
        cmd: uv run ruff check src/ tests/
        chdir: "{{ app_repo_path }}/apps/api"
      delegate_to: localhost
      run_once: true
      changed_when: false

    - name: Run API tests (pytest)
      ansible.builtin.command:
        cmd: uv run pytest tests/ -q --tb=short
        chdir: "{{ app_repo_path }}/apps/api"
      delegate_to: localhost
      run_once: true
      changed_when: false

    - name: Build and push API image
      ansible.builtin.command:
        cmd: >-
          docker buildx build --push
          -t {{ registry_image_api }}
          apps/api
        chdir: "{{ app_repo_path }}"
      delegate_to: localhost
      run_once: true
      changed_when: true

    - name: Build and push web image
      ansible.builtin.command:
        cmd: >-
          docker buildx build --push
          -t {{ registry_image_web }}
          --build-arg PUBLIC_TURNSTILE_SITE_KEY={{ vault_turnstile_site_key }}
          apps/web
        chdir: "{{ app_repo_path }}"
      delegate_to: localhost
      run_once: true
      changed_when: true

  tasks:
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_remote_path }}"
        state: directory
        owner: "{{ vm_ssh_user }}"
        mode: "0755"
      become: true

    - name: Write docker-compose.yml
      ansible.builtin.template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ app_remote_path }}/docker-compose.yml"
        owner: "{{ vm_ssh_user }}"
        mode: "0644"

    - name: Write API .env
      ansible.builtin.template:
        src: ../templates/env.j2
        dest: "{{ app_remote_path }}/.env"
        owner: "{{ vm_ssh_user }}"
        mode: "0600"

    - name: Pull latest images and start stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_remote_path }}"
        pull: always
        state: present
        remove_orphans: true
