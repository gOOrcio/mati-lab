networks:
  pihole-net:
    external: true

services:
  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node-exporter
    restart: always
    security_opt: [no-new-privileges:true]
    networks: [pihole-net]
    pid: host
    command:
      - '--path.rootfs=/rootfs'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.textfile.directory=/var/lib/node_exporter/textfile_collector'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+|var/lib/containerd/.+|snap)($|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - node_textfile:/var/lib/node_exporter/textfile_collector:rw

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    restart: always
    security_opt: [no-new-privileges:true]
    networks: [pihole-net]
    privileged: true
    command:
      - '-port=9092'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9092/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /mnt/nvme/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

volumes:
  node_textfile: {}
