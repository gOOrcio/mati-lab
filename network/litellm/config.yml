# LiteLLM gateway config for the Phase 3 LLM stack.
#
# IPs:
#   192.168.1.48  = Proxmox Ollama VM (ollama-gpu) — always-on
#   192.168.1.173 = Dev PC (Ubuntu-side only) — health-flaps by design
#
# Aliases consumed by clients:
#   agent-default : Hermes daily driver. DeepSeek > Claude > local Qwen 14B.
#   agent-smart   : Hermes explicit escalation. Claude Sonnet 4.6 only.
#   coding        : OpenCode or ad-hoc code. Dev PC > DeepSeek > Proxmox.
#   embeddings    : Phase 6 RAG consumer. Always Proxmox nomic-embed.

model_list:
  # ── agent-default (Hermes session driver) ──
  - model_name: agent-default
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      order: 1

  - model_name: agent-default           # fallback 1: Claude if DeepSeek 5xx
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      order: 2

  - model_name: agent-default           # fallback 2: local dense 14B (dev PC)
    litellm_params:
      model: ollama_chat/qwen3.5:14b
      api_base: http://192.168.1.173:11434
    model_info:
      order: 3
      input_cost_per_token: 0
      output_cost_per_token: 0

  # ── agent-smart (explicit /smart or delegated subagents) ──
  - model_name: agent-smart
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── coding (OpenCode primary, code-specific model) ──
  - model_name: coding
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://192.168.1.173:11434
    model_info:
      order: 1
      input_cost_per_token: 0
      output_cost_per_token: 0

  - model_name: coding                  # fallback 1: DeepSeek if dev PC off
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      order: 2

  - model_name: coding                  # fallback 2: Proxmox 7B coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder:7b
      api_base: http://192.168.1.48:11434
    model_info:
      order: 3
      input_cost_per_token: 0
      output_cost_per_token: 0

  # ── embeddings (Phase 6 RAG consumer) ──
  - model_name: embeddings
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://192.168.1.48:11434

router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 2
  timeout: 30
  provider_budget_config:
    anthropic:
      budget_limit: 20.0      # USD per month
      time_period: 1mo
    deepseek:
      budget_limit: 10.0      # USD per month
      time_period: 1mo

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  background_health_checks: true
  health_check_interval: 30
  enable_health_check_routing: true

# Enable Prometheus metrics at /metrics for the scrape job in
# network/prometheus/prometheus.yml. Without this the endpoint 404s.
litellm_settings:
  callbacks: ["prometheus"]
