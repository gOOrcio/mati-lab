networks:
  pihole-net:
    external: true

services:
  litellm:
    # Pinned to a dated stable tag. Using Docker Hub instead of ghcr.io
    # — GitHub's blob CDN (pkg-containers.githubusercontent.com) was
    # failing TLS during pulls on 2026-04-24. Bump tag deliberately.
    image: litellm/litellm:v1.83.7-stable
    container_name: litellm
    restart: always
    security_opt: [no-new-privileges:true]
    command: ["--config", "/etc/litellm/config.yml", "--port", "4000"]
    env_file: .env
    volumes:
      - ./config.yml:/etc/litellm/config.yml:ro
    networks: [pihole-net]
    # LAN-only: bind only to loopback so the admin API isn't accessible
    # without Caddy + Authelia in front. Other services on pihole-net
    # still reach litellm at http://litellm:4000 via the Docker network.
    ports:
      - "127.0.0.1:4000:4000"
    labels:
      - "com.docker.compose.project=litellm"
      - "com.docker.compose.service=litellm"
