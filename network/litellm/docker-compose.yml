networks:
  pihole-net:
    external: true

services:
  litellm:
    # Pinned to a dated stable tag. `main-latest` was retired by the
    # project; current floating alternatives are `main-stable` or dated
    # tags like `v1.83.7-stable`. Bump deliberately; don't use floating.
    image: ghcr.io/berriai/litellm:v1.83.7-stable
    container_name: litellm
    restart: always
    security_opt: [no-new-privileges:true]
    command: ["--config", "/etc/litellm/config.yml", "--port", "4000"]
    env_file: .env
    volumes:
      - ./config.yml:/etc/litellm/config.yml:ro
    networks: [pihole-net]
    # LAN-only: bind only to loopback so the admin API isn't accessible
    # without Caddy + Authelia in front. Other services on pihole-net
    # still reach litellm at http://litellm:4000 via the Docker network.
    ports:
      - "127.0.0.1:4000:4000"
    labels:
      - "com.docker.compose.project=litellm"
      - "com.docker.compose.service=litellm"
