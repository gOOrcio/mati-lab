networks:
  pihole-net:
    external: true

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    dns:
      - 1.1.1.1
      - 1.0.0.1
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=home.mati-lab.online
      # Widget credentials (sourced from network/.env on the Pi):
      - HOMEPAGE_VAR_PROXMOX_TOKEN_ID=${PROXMOX_HOMEPAGE_TOKEN_ID:-}
      - HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET=${PROXMOX_HOMEPAGE_TOKEN_SECRET:-}
      - HOMEPAGE_VAR_HOMEBRIDGE_USERNAME=${HOMEBRIDGE_USERNAME:-}
      - HOMEPAGE_VAR_HOMEBRIDGE_PASSWORD=${HOMEBRIDGE_PASSWORD:-}
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # GID 988 = docker group on the Pi (verify with `getent group docker`).
    # The gethomepage image hardcodes the node user's groups at image build
    # time, so PUID/PGID don't propagate. group_add injects supplementary
    # groups at container start, giving the node user just enough access to
    # read /var/run/docker.sock (mode 660 root:docker) for label-driven
    # auto-discovery of Pi services.
    group_add:
      - "988"
    networks:
      - pihole-net
    labels:
      - "com.docker.compose.project=homepage"
      - "com.docker.compose.service=homepage"
      - homepage.group=Network
      - homepage.name=Homepage
      - homepage.icon=mdi-view-dashboard
      - homepage.href=https://home.mati-lab.online
      - homepage.description=This dashboard
