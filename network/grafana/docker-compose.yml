networks:
  pihole-net:
    external: true

volumes:
  grafana-storage: {}

services:
  grafana:
    image: grafana/grafana:12.2.5
    container_name: grafana
    restart: always
    security_opt: [no-new-privileges:true]
    env_file:
      - .env
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
    networks:
      - pihole-net
    labels:
      - "com.docker.compose.project=grafana"
      - "com.docker.compose.service=grafana"
      - "homepage.group=Observability"
      - "homepage.name=Grafana"
      - "homepage.icon=grafana.png"
      - "homepage.href=https://grafana.mati-lab.online"
      - "homepage.description=Dashboards"
      - "homepage.widget.type=grafana"
      - "homepage.widget.url=http://grafana:3000"
      - "homepage.widget.username=admin"
      - "homepage.widget.password=${GRAFANA_VIEWER_PASSWORD}"
