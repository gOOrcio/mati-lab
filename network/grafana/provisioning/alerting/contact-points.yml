apiVersion: 1

contactPoints:
  - orgId: 1
    name: ntfy-alerts
    receivers:
      - uid: ntfy-alerts
        type: webhook
        settings:
          url: http://grafana-ntfy-bridge:4000/webhook
          httpMethod: POST
          title: "{{ template \"mati-lab.title\" . }}"
          message: "{{ template \"mati-lab.message\" . }}"
        disableResolveMessage: false
