apiVersion: 1

groups:
  - orgId: 1
    name: infrastructure
    folder: Alerts
    interval: 1m
    rules:
      - uid: disk-usage-high
        title: Disk Usage High
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-mati-lab
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                (
                  node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs", mountpoint="/"}
                  - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs", mountpoint="/"}
                ) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs", mountpoint="/"} * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [80]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: Disk usage above 80%
          description: "Disk usage on {{ $labels.instance }} is {{ if $values.A }}{{ printf \"%.0f\" $values.A.Value }}%{{ else }}N/A{{ end }}"
        labels:
          severity: warning

      - uid: iowait-high
        title: IO Wait High
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-mati-lab
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                avg by (instance) (
                  rate(node_cpu_seconds_total{mode="iowait"}[5m])
                ) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [50]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: IO wait above 50%
          description: "IO wait on {{ $labels.instance }} is {{ if $values.A }}{{ printf \"%.0f\" $values.A.Value }}%{{ else }}N/A{{ end }} — possible storage saturation"
        labels:
          severity: warning

      - uid: memory-usage-high
        title: Memory Usage High
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-mati-lab
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                (
                  1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
                ) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [90]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: Memory usage above 90%
          description: "Memory usage on {{ $labels.instance }} is {{ if $values.A }}{{ printf \"%.0f\" $values.A.Value }}%{{ else }}N/A{{ end }}"
        labels:
          severity: critical

      - uid: container-errors
        title: Container Error Rate High
        condition: C
        data:
          - refId: A
            datasourceUid: loki-sentinel
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                sum by (container) (
                  rate({job="docker"} |~ "(?i)error"[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0.5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: Container error rate elevated
          description: "Container {{ $labels.container }} is logging errors at {{ printf \"%.2f\" $values.A.Value }} errors/sec"
        labels:
          severity: warning

  - orgId: 1
    name: restorate
    folder: Restorate
    interval: 1m
    rules:
      - uid: restorate-high-error-rate
        title: High Error Rate
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-mati-lab
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                sum(rate(rpc_requests_total{job="restorate",status!="OK"}[5m]))
                /
                sum(rate(rpc_requests_total{job="restorate"}[5m]))
                and on() sum(rate(rpc_requests_total{job="restorate"}[5m])) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: High error rate on Restorate
          description: "Restorate error rate is {{ if $values.A }}{{ humanizePercentage $values.A.Value }}{{ else }}N/A{{ end }} (threshold: 5%)"
        labels:
          severity: warning

      - uid: restorate-high-p95-latency
        title: High P95 Latency
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-mati-lab
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                histogram_quantile(0.95,
                  sum(rate(rpc_request_duration_seconds_bucket{job="restorate"}[5m])) by (le))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: High P95 latency on Restorate
          description: "Restorate P95 latency is {{ if $values.A }}{{ printf \"%.2f\" $values.A.Value }}s{{ else }}N/A{{ end }} (threshold: 2s)"
        labels:
          severity: warning

      - uid: restorate-app-down
        title: App Down
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-mati-lab
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: up{job="restorate"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: Restorate is down
          description: "Prometheus cannot scrape Restorate at {{ $labels.instance }}"
        labels:
          severity: critical

      - uid: restorate-high-memory
        title: High Memory
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-mati-lab
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: process_resident_memory_bytes{job="restorate"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [500000000]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: High memory usage on Restorate
          description: "Restorate RSS is {{ if $values.A }}{{ humanize $values.A.Value }}B{{ else }}N/A{{ end }} (threshold: 500MB)"
        labels:
          severity: warning

      - uid: restorate-high-db-latency
        title: High DB Latency
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-mati-lab
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                histogram_quantile(0.95,
                  sum(rate(restorate_db_query_duration_seconds_bucket{job="restorate"}[5m])) by (le))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: High DB query latency on Restorate
          description: "Restorate DB P95 latency is {{ if $values.A }}{{ printf \"%.2f\" $values.A.Value }}s{{ else }}N/A{{ end }} (threshold: 1s)"
        labels:
          severity: warning

      - uid: restorate-google-places-error-ratio
        title: Google Places Error Ratio
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-mati-lab
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: |
                sum(rate(restorate_google_places_errors_total{job="restorate"}[5m]))
                /
                sum(rate(restorate_google_places_requests_total{job="restorate"}[5m]))
                and
                sum(rate(restorate_google_places_requests_total{job="restorate"}[5m])) > 0.1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: High Google Places error ratio on Restorate
          description: "Google Places error rate is {{ if $values.A }}{{ humanizePercentage $values.A.Value }}{{ else }}N/A{{ end }} (threshold: 5%)"
        labels:
          severity: warning
