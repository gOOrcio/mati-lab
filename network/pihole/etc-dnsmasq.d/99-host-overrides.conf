address=/mati-lab.online/192.168.1.252
local=/mati-lab.online/

# Specific overrides — take precedence over the wildcard above.
# Gitea SSH endpoint (LAN+VPN only — Caddy doesn't forward :30009).
# Separated from nas.mati-lab.online so browser HTTPS to the NAS goes
# through Caddy (real cert) instead of TrueNAS's self-signed cert.
address=/gitea-ssh.mati-lab.online/192.168.1.65

# Force NXDOMAIN for WPAD so Windows/Edge proxy auto-discovery can't be
# answered by the wildcard above (which would point clients at Caddy).
server=/wpad.mati-lab.online/
server=/wpad/
