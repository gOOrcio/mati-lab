networks:
  pihole-net:
    external: true

services:
  redis:
    image: redis:7.2-alpine
    container_name: authelia-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${AUTHELIA_SESSION_REDIS_PASSWORD}"]
    volumes:
      - ./redis-data:/data
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    networks:
      - pihole-net
    labels:
      - "com.docker.compose.project=authelia"
      - "com.docker.compose.service=redis"

  authelia:
    image: authelia/authelia:4.38
    container_name: authelia
    env_file:
      - .env
    volumes:
      - ./configuration.yml:/config/configuration.yml
      - ./data:/config/data
    ports:
      - 9091:9091
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    depends_on:
      - redis
    networks:
      - pihole-net
    labels:
      - "com.docker.compose.project=authelia"
      - "com.docker.compose.service=authelia"
      - "homepage.group=Network"
      - "homepage.name=Authelia"
      - "homepage.icon=authelia.png"
      - "homepage.href=https://auth.mati-lab.online"
      - "homepage.description=Forward-auth (2FA SSO)"
      - "homepage.widget.type=authelia"
      - "homepage.widget.url=http://authelia:9091"
