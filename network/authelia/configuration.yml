---
# Authelia minimal configuration for mati-lab homelab
# Docs: https://www.authelia.com/configuration/

server:
  address: 'tcp://:9091'

log:
  level: info

authentication_backend:
  file:
    path: /config/data/users_database.yml
    watch: true

session:
  name: authelia_session
  same_site: lax
  inactivity: 30m
  expiration: 12h
  remember_me: 1M
  redis:
    host: redis
    port: 6379
    database_index: 0
  cookies:
    - domain: 'mati-lab.online'
      authelia_url: 'https://authelia.mati-lab.online'
      default_redirection_url: 'https://homarr.mati-lab.online'
      name: authelia_session
      same_site: lax
      inactivity: 30m
      expiration: 12h
      remember_me: 1M

storage:
  local:
    path: /config/data/db.sqlite3

totp:
  issuer: mati-lab.online

access_control:
  default_policy: two_factor
  rules:
    - domain: ntfy.mati-lab.online
      policy: bypass

notifier:
  filesystem:
    filename: /config/data/notification.txt

identity_providers:
  oidc:
    hmac_secret: '{{ secret "/config/data/oidc_hmac_secret.txt" }}'
    jwks:
      - key_id: 'main'
        algorithm: 'RS256'
        use: 'sig'
        key: {{ secret "/config/data/oidc.key" | mindent 10 "|" | msquote }}
    clients:
      - client_id: 'proxmox'
        client_name: 'Proxmox VE'
        client_secret: '$argon2id$v=19$m=65536,t=3,p=4$VdAHHH7+fHDCBgomE3jTBw$xM9/wSPMIRm5VvwpBPgLtebWbykSHGYGafTN6450tRI'
        authorization_policy: 'two_factor'
        redirect_uris:
          - 'https://proxmox.mati-lab.online'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
        grant_types:
          - 'authorization_code'
        response_types:
          - 'code'
        userinfo_signed_response_alg: 'none'
        token_endpoint_auth_method: 'client_secret_basic'
