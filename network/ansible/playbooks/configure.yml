- name: Configure Network Pi
  hosts: network-pi
  become: true
  vars_files:
    - ../group_vars/all/vars.yml

  tasks:
    # ── Base system ─────────────────────────────────────────────────────────
    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ pi_hostname }}"
      tags: [base]

    - name: Set timezone
      community.general.timezone:
        name: "{{ pi_timezone }}"
      tags: [base]

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
        cache_valid_time: 3600
      tags: [base]

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - htop
          - rsync
          - jq
          - unattended-upgrades
          - apt-listchanges
        state: present
      tags: [base]

    # ── Docker ──────────────────────────────────────────────────────────────
    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: [docker]

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
      tags: [docker]

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
          - docker-buildx-plugin
        update_cache: true
      tags: [docker]

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ pi_user }}"
        groups: docker
        append: true
      tags: [docker]

    - name: Configure Docker daemon
      ansible.builtin.template:
        src: ../templates/daemon.json.j2
        dest: /etc/docker/daemon.json
        mode: "0644"
      notify: Restart Docker
      tags: [docker]

    - name: Ensure Docker is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      tags: [docker]

    - name: Prune Docker build cache weekly
      ansible.builtin.cron:
        name: "docker system prune"
        weekday: "0"
        hour: "3"
        minute: "0"
        job: "docker system prune -f --filter 'until=168h' > /dev/null 2>&1"
        user: root
      tags: [docker]

    # ── SSH hardening ───────────────────────────────────────────────────────
    - name: Harden SSH config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        validate: "sshd -t -f %s"
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin {{ ssh_permit_root_login }}' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication {{ ssh_password_authentication }}' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication {{ ssh_pubkey_authentication }}' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries {{ ssh_max_auth_tries }}' }
        - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
        - { regexp: '^#?AllowAgentForwarding', line: 'AllowAgentForwarding no' }
      notify: Restart SSH
      tags: [security, ssh]

    # ── UFW firewall ────────────────────────────────────────────────────────
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
      tags: [security, ufw]

    - name: Set UFW default incoming policy
      community.general.ufw:
        direction: incoming
        policy: "{{ ufw_default_incoming }}"
      tags: [security, ufw]

    - name: Set UFW default outgoing policy
      community.general.ufw:
        direction: outgoing
        policy: "{{ ufw_default_outgoing }}"
      tags: [security, ufw]

    - name: Configure UFW rules
      community.general.ufw:
        rule: "{{ item.rule }}"
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        from_ip: "{{ item.from | default('any') }}"
        comment: "{{ item.comment | default(omit) }}"
      loop: "{{ ufw_rules }}"
      tags: [security, ufw]

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      tags: [security, ufw]

    # ── fail2ban ────────────────────────────────────────────────────────────
    - name: Install fail2ban
      ansible.builtin.apt:
        name: fail2ban
        state: present
      tags: [security, fail2ban]

    - name: Configure fail2ban
      ansible.builtin.template:
        src: ../templates/jail.local.j2
        dest: /etc/fail2ban/jail.local
        mode: "0644"
      notify: Restart fail2ban
      tags: [security, fail2ban]

    - name: Enable and start fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started
      tags: [security, fail2ban]

    # ── Swap (zram) ─────────────────────────────────────────────────────────
    - name: Install zram-config
      ansible.builtin.apt:
        name: zram-config
        state: present
      tags: [base]

    # ── Unattended upgrades ─────────────────────────────────────────────────
    - name: Configure unattended-upgrades
      ansible.builtin.template:
        src: ../templates/50unattended-upgrades.j2
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: "0644"
      tags: [base]

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Restart SSH
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: Restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
