# Backup configuration for Pi 5 network services
# Format: service_name:type:source_path
# Types:
#   bind    — rsync a bind-mounted host directory
#   volume  — rsync a Docker named volume (resolved via docker volume inspect)
#   export  — run a pre-backup command, then rsync the output directory
#
# Paths are relative to /opt/mati-lab/network/ for bind mounts.
# Volume names are as they appear in `docker volume ls`.

# --- Critical (config + state) ---
grafana:export:/opt/mati-lab/network/scripts/export-grafana-dashboards.sh
grafana:volume:grafana_grafana-storage
pihole:bind:pihole/etc-pihole
pihole:bind:pihole/etc-dnsmasq.d
authelia:bind:authelia/data
authelia:bind:authelia/redis-data
authelia:bind:authelia/configuration.yml
uptime-kuma:bind:uptime-kuma/app/data
homarr:bind:homarr/appdata
ntfy:bind:ntfy/var/lib/ntfy
ntfy:bind:ntfy/etc/ntfy
caddy:bind:caddy/data
caddy:bind:caddy/config
caddy:bind:caddy/Caddyfile
diun:bind:diun/data

# --- Monitoring (can be rebuilt, but nice to keep) ---
prometheus:volume:prometheus_prometheus-data
loki:volume:loki_loki-data
