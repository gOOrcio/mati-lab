global:
  scrape_interval: 15s

# Phase 8: load alert rules from rules/*.yml + push firing alerts to
# Alertmanager (running in pihole-net at alertmanager:9093, fronted at
# alertmanager.mati-lab.online behind Authelia 2FA). Rules cover only
# what's PromQL-shaped today — scrape-down + LiteLLM error/budget.
# ZFS pool / SMART / disk capacity stays on the cron-ntfy path
# (nas/backup-jobs/zfs-health-cron.sh) until a proper ZFS exporter
# lands.
rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [ 'prometheus:9090' ]

  - job_name: restorate
    static_configs:
      - targets: ['192.168.1.203:3001']
    metrics_path: /metrics

  - job_name: restorate-dev
    static_configs:
      - targets: [ '192.168.1.173:3001' ]
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: [ 'node-exporter:9100' ]

  - job_name: cadvisor
    static_configs:
      - targets: [ 'cadvisor:9092' ]

  - job_name: caddy
    static_configs:
      - targets: [ 'caddy:2019' ]

  - job_name: sentinel-trader
    scrape_interval: 30s
    static_configs:
      - targets: [ '192.168.1.202:9090' ]   # sentinel-trader VM on LAN

  - job_name: proxmox
    scrape_interval: 30s
    metrics_path: /pve
    params:
      target: ['192.168.1.184']
      cluster: ['1']
      node: ['1']
    static_configs:
      - targets: [ 'pve-exporter:9221' ]   # PVE exporter on Pi

  # TrueNAS pushes Netdata-format metrics to graphite-exporter via Carbon
  # (tcp/2003). We scrape the translated output here.
  - job_name: graphite-exporter
    scrape_interval: 30s
    static_configs:
      - targets: [ 'graphite-exporter:9108' ]

  # LiteLLM exposes request count / spend / latency at /metrics.
  # Runs on NAS (TrueNAS Custom App), not pihole-net.
  - job_name: litellm
    static_configs:
      - targets: [ '192.168.1.65:4000' ]
    metrics_path: /metrics

  # Qdrant — vector store for the Phase 6 RAG pipeline.
  # Exposes /metrics on the same port as the REST API (30017 host port).
  - job_name: qdrant
    static_configs:
      - targets: [ '192.168.1.65:30017' ]
        labels:
          service: qdrant
          host: nas
    metrics_path: /metrics

  # OpenClaw deliberately NOT scraped — its /metrics path is served by
  # the SPA router, not Prometheus. Use Uptime Kuma on `:30262/health`
  # for liveness instead (see network/uptime-kuma/monitors.md).
