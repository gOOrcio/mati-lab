global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [ 'prometheus:9090' ]

  - job_name: restorate
    static_configs:
      - targets: ['192.168.1.203:3001']
    metrics_path: /metrics

  - job_name: restorate-dev
    static_configs:
      - targets: [ '192.168.1.173:3001' ]
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: [ 'node-exporter:9100' ]

  - job_name: cadvisor
    static_configs:
      - targets: [ 'cadvisor:9092' ]

  - job_name: caddy
    static_configs:
      - targets: [ 'caddy:2019' ]

  - job_name: sentinel-trader
    scrape_interval: 30s
    static_configs:
      - targets: [ '192.168.1.202:9090' ]   # sentinel-trader VM on LAN

  - job_name: proxmox
    scrape_interval: 30s
    metrics_path: /pve
    params:
      target: ['192.168.1.184']
      cluster: ['1']
      node: ['1']
    static_configs:
      - targets: [ 'pve-exporter:9221' ]   # PVE exporter on Pi

  # TrueNAS pushes Netdata-format metrics to graphite-exporter via Carbon
  # (tcp/2003). We scrape the translated output here.
  - job_name: graphite-exporter
    scrape_interval: 30s
    static_configs:
      - targets: [ 'graphite-exporter:9108' ]

  # LiteLLM exposes request count / spend / latency at /metrics.
  # Runs on NAS (TrueNAS Custom App), not pihole-net.
  - job_name: litellm
    static_configs:
      - targets: [ '192.168.1.65:4000' ]
    metrics_path: /metrics

  # OpenClaw — NAS catalog app. Exposes Prometheus /metrics natively.
  - job_name: openclaw
    static_configs:
      - targets: [ '192.168.1.65:30262' ]
    metrics_path: /metrics
