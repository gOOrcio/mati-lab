networks:
  pihole-net:
    external: true

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.1.0
    container_name: uptime-kuma
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN=true
    volumes:
      - ./app/data:/app/data
    networks:
      - pihole-net
    dns:
      - 1.1.1.1
      - 1.0.0.1
    labels:
      - "com.docker.compose.project=uptime-kuma"
      - "com.docker.compose.service=uptime-kuma"
      - "homepage.group=Observability"
      - "homepage.name=Uptime-Kuma"
      - "homepage.icon=uptime-kuma.png"
      - "homepage.href=https://kuma.mati-lab.online"
      - "homepage.description=Active probe + alerting"
      - "homepage.widget.type=uptimekuma"
      - "homepage.widget.url=http://uptime-kuma:3001"
      - "homepage.widget.slug=mati-lab"
